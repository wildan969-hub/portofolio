<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aplikasi Kasir</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:380px;
    background:#fff;
    padding:25px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    color:#1565C0;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:5px;
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#1565C0;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0D47A1;
}

.hasil{
    margin-top:20px;
    background:#eef5ff;
    padding:15px;
    border-radius:10px;
}

.hasil p{
    margin:8px 0;
}
</style>
</head>

<body>

<div class="container">

    <h2>🛒 Aplikasi Kasir</h2>

    <label>Nama Barang</label>
    <input type="text" id="nama" placeholder="Masukkan nama barang">

    <label>Harga Barang</label>
    <input type="number" id="harga" placeholder="Masukkan harga">

    <label>Jumlah Barang</label>
    <input type="number" id="jumlah" placeholder="Masukkan jumlah">

    <button onclick="tambahBarang()">+ Tambah Barang</button>

    <table style="width:100%; margin-top:20px; border-collapse:collapse;">

        <thead>
            <tr style="background:#1565C0; color:white;">
                <th style="padding:10px;">Barang</th>
                <th>Harga</th>
                <th>Qty</th>
                <th>Total</th>
                <th>Aksi</th>
            </tr>
        </thead>

        <tbody id="daftarBarang">

            <tr>
                <td colspan="4" style="text-align:center; padding:15px;">
                    Belum ada barang
                </td>
            </tr>

        </tbody>

    </table>

    <div class="hasil">

        <p><strong>Total Belanja:</strong> Rp<span id="totalBelanja">0</span></p>

        <label>Uang Pembeli</label>
<input type="number" id="bayar" placeholder="Masukkan uang">

<button onclick="hitung()">Hitung Kembalian</button>

<button onclick="resetKasir()">🔄 Reset</button>

<p><strong>Kembalian:</strong> Rp<span id="kembalian">0</span></p>
    </div>

</div>

<script>

let totalBelanja = 0;

function tambahBarang(){

    const nama = document.getElementById("nama").value;
    const harga = Number(document.getElementById("harga").value);
    const jumlah = Number(document.getElementById("jumlah").value);

    if(nama==="" || harga<=0 || jumlah<=0){
        alert("Lengkapi data barang!");
        return;
    }

    const total = harga * jumlah;

    totalBelanja += total;

    const tbody = document.getElementById("daftarBarang");

    if(tbody.innerHTML.includes("Belum ada barang")){
        tbody.innerHTML = "";
    }

    tbody.innerHTML += `
<tr>
    <td>${nama}</td>
    <td>Rp${harga.toLocaleString("id-ID")}</td>
    <td>${jumlah}</td>
    <td>Rp${total.toLocaleString("id-ID")}</td>
    <td>
        <button onclick="hapusBarang(this, ${total})">🗑️</button>
    </td>
</tr>
`;

    document.getElementById("totalBelanja").textContent =
    totalBelanja.toLocaleString("id-ID");

    document.getElementById("nama").value="";
    document.getElementById("harga").value="";
    document.getElementById("jumlah").value="";

}

function hitung(){

    const bayar = Number(document.getElementById("bayar").value);

    const kembali = bayar - totalBelanja;

    document.getElementById("kembalian").textContent =
    kembali.toLocaleString("id-ID");

}
function hapusBarang(btn, total){

    btn.parentElement.parentElement.remove();

    totalBelanja -= total;

    document.getElementById("totalBelanja").textContent =
    totalBelanja.toLocaleString("id-ID");

    const tbody = document.getElementById("daftarBarang");

    if(tbody.rows.length === 0){
        tbody.innerHTML = `
        <tr>
            <td colspan="5" style="text-align:center;">
                Belum ada barang
            </td>
        </tr>`;
    }

}

function resetKasir(){

    totalBelanja = 0;

    document.getElementById("daftarBarang").innerHTML = `
    <tr>
        <td colspan="5" style="text-align:center;">
            Belum ada barang
        </td>
    </tr>`;

    document.getElementById("totalBelanja").textContent = "0";
    document.getElementById("kembalian").textContent = "0";
    document.getElementById("bayar").value = "";

}
</script>

</body>
</html>
